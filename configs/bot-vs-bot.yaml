match:
  id: bot_vs_bot_smoke
  output_dir: runs/bot_vs_bot_smoke
  max_plies: 120
  auto_start: true

server:
  port: 3000

ui:
  board_theme: classic
  piece_set: standard
  animation_ms: 180
  show_legal_moves: true
  show_last_move: true
  show_coordinates: true
  enable_sound: false

chess:
  starting_position: standard
  starting_fen: null
  rules:
    threefold_repetition: true
    fifty_move_rule: true
    insufficient_material: true
  clocks:
    enabled: false
    initial_seconds: 600
    increment_seconds: 2

players:
  white:
    type: bot
    name: Heuristic Bot
    bot: heuristic

  black:
    type: bot
    name: Random Bot
    bot: random
