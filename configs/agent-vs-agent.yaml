match:
  id: openrouter_agent_vs_agent
  output_dir: runs/openrouter_agent_vs_agent
  max_plies: 200
  auto_start: true

server:
  port: 3000

ui:
  board_theme: classic
  piece_set: standard
  animation_ms: 180
  show_legal_moves: true
  show_last_move: true
  show_coordinates: true
  enable_sound: false

chess:
  starting_position: standard
  starting_fen: null
  rules:
    threefold_repetition: true
    fifty_move_rule: true
    insufficient_material: true
  clocks:
    enabled: false
    initial_seconds: 600
    increment_seconds: 2

players:
  white:
    type: llm
    name: OpenRouter Chess Agent
    agent_config: agents/openrouter_chess_agent.yaml

  black:
    type: llm
    name: Aggressive OpenRouter Agent
    agent_config: agents/aggressive_chess_agent.yaml
